<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>쥐돌이쥐돌이</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

section {
    background: rgb(0, 0, 0);
    padding-top: 150px;
    color: rgb(244, 244, 244);
    text-align: center;
}

body{
    background: black;
    font-family: "IBM Plex Sans KR", sans-serif;
}

h1 {
  color: white;
  font-weight: 300;
  font-size: 27px;
  transition: opacity 0.5s;
}

.day_img.smallest {
  width: 20vw;
}

.no{padding-top: 0px;}

.section{
    height: 150vh;
    position: relative;
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
}

.content{
    position: sticky;
    top: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: white;
    pointer-events: none;
}

.content img{
    width: 20%;
    margin-bottom: 30px;
}

.bg1 h1{ margin-top: 180px; }
.bg2 h1{ margin-top: 310px; }
.bg3 h1{ margin-top: 510px; }
.bg4 h1{ margin-top: 710px; }
.bg5 h1{ margin-top: 450px; }

.bg1{
    background-image: url('밤.png');
    background-size: 31%;
    background-repeat: no-repeat;
    background-position: center;
}

.bg2{
    background-image: url('밤.png');
    background-size: 55%;
    background-repeat: no-repeat;
    background-position: center;
}

.bg3{
    background-image: url('밤.png');
    background-size: 75%;
    background-repeat: no-repeat;
    background-position: center;
}

.bg4{
    background-image: url('밤.png');
    background-size: 100%;
    background-repeat: no-repeat;
    background-position: center;
}

.bg5{
    background-image: url('쥐인간.png');
    background-size: 70%;
    background-repeat: no-repeat;
    background-position: center;
}

</style>
</head>
<body>
  <section>
    <img src="낮.jpg" alt="낮" class="day_img smallest" style="padding-top: 100px;">
    <div>
    <h1>결국 생쥐는 쌀을 전부 먹어버렸다</h1>
    </div>
  </section>

  <section>
    <h1 style="padding-top: 500px;">돌이킬 수 없는 곳까지 온 생쥐는</h1>
  </section>

<section> 
    <h1 style="padding-top: 500px; padding-bottom: 60px;">몇날며칠을 굶었다</h1>
    <img src="밤낮.png" style="width: 100%; object-fit: contain;">
    <h1 style="padding-top: 100px; padding-bottom: 60px;">그렇게 죽을 고비 앞에 선 생쥐는</h1>
</section>

<section> 
    <img src="손톱.png" style="width: 7vw; padding-top: 500px;">
    <h1 style="padding-top: 40px; padding-bottom: 60px;">집주인의 손톱을 먹고 사람으로 변한 친구가 떠올랐고</h1>
</section>

<section style="position: relative; display: flex; justify-content: center; align-items: center; padding-top: 1000px;">
    <img src="밤.png" alt="낮" style="width: 30vw;" >
    <img src="손톱.png" style="width: 7vw; position: absolute; top: 89%; left: 50%; transform: translate(-50%, -50%);">
</section>

<section class="no"> 
    <h1 style="padding-top: 100px; padding-bottom: 60px;">머리 위에 떠있는 초승달을 갉아먹기 시작했다</h1>
</section>

<section class="section bg1">
    <div class="content">
        <h1>처음에는 속이 좀 안 좋더니</h1>
    </div>
</section>

<section class="section bg2">
    <div class="content">
        <h1>곧 몸이 부풀기 시작하고</h1>
    </div>
</section>

<section class="section bg3">
    <div class="content">
        <h1>쌀독에 꽉 끼는 크기가 되더니</h1>
    </div>
</section>

<section class="section bg4">
    <div class="content">
        <h1>숨을 쉴 수가 없었다</h1>
    </div>
</section>

  <section>
    <h1 style="padding-top: 600px; padding-bottom: 1000px;">그렇게 생쥐는 한참을 발버둥 치다</h1>
  </section>

<section class="section bg5">
    <div class="content">
        <h1 style="padding-top: 300px;">죽었다..</h1>
    </div>
</section>

</body>
</html>
